# This file is for local development only.
# For production/self-hosting setup, see the README.
services:
  editor:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./tibia/sprites:/app/sprites:ro
      - ./maps:/app/maps
      - sprites-png:/app/sprites-png
    restart: unless-stopped

volumes:
  sprites-png:
